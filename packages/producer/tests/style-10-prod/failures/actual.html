    <meta charset="UTF-8">

    <title>Ahn Sang-soo Play Mode Video</title>
    <style>html,
      body {
        margin: 0;
        padding: 0;
        width: 1080px;
        height: 1920px;
      }

      body {
        background-color: #000;
        overflow: hidden;
      }

      #master-root {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
      }

      #main-layer,
      #graphics-layer,
      #captions-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #main-layer {
        z-index: 0;
      }

      #graphics-layer {
        z-index: 10;
      }

      #captions-layer {
        z-index: 20;
      }

[data-composition-id="main-orchestration"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background-color: #f8f9fa;
        position: relative;
      }

      [data-composition-id="main-orchestration"] .background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background-color: #f8f9fa;
      }

      [data-composition-id="main-orchestration"] .bg-pattern {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        opacity: 0;
        background-image: radial-gradient(#001f3f 3px, transparent 3px);
        background-size: 80px 80px;
        background-position: 0 0;
      }

      [data-composition-id="main-orchestration"] .a-roll-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }

      [data-composition-id="main-orchestration"] video {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
        object-fit: cover;
        border-radius: 40px;
        transform-origin: center center;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      }
    


      

      [data-composition-id="graphics"] {
        font-family: "Nunito", sans-serif;
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
      }

      [data-composition-id="graphics"] .graphic-container {
        position: absolute;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      [data-composition-id="graphics"] .sticker-container {
        position: relative;
        background-color: rgba(255, 255, 255, 0.9);
        border: 4px solid white;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      [data-composition-id="graphics"] .sticker-container.pink-bg {
        background-color: rgba(255, 45, 138, 0.9);
        border-color: #ff2d8a;
      }

      [data-composition-id="graphics"] .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 60px;
      }

      [data-composition-id="graphics"] .stat-text {
        font-size: 160px;
        line-height: 0.9;
        font-weight: 900;
        letter-spacing: 4px;
      }

      [data-composition-id="graphics"] .sub-text {
        font-size: 60px;
        line-height: 1.1;
        font-weight: 900;
        text-align: center;
        margin-top: 15px;
        letter-spacing: 6px;
      }

      [data-composition-id="graphics"] .pill-shape {
        padding: 20px 50px;
        border-radius: 100px;
        margin-top: 30px;
      }

      [data-composition-id="graphics"] .pill-text {
        font-size: 40px;
        font-weight: 900;
        white-space: nowrap;
        letter-spacing: 2px;
      }

      [data-composition-id="graphics"] .finale-text {
        font-size: 100px;
        font-weight: 900;
        white-space: nowrap;
        letter-spacing: 2px;
      }

      [data-composition-id="graphics"] .blue-text {
        color: #0033cc;
      }
      [data-composition-id="graphics"] .pink-text {
        color: #ff2d8a;
      }
      [data-composition-id="graphics"] .green-text {
        color: #a3e635;
      }
      [data-composition-id="graphics"] .white-text {
        color: white;
      }
      [data-composition-id="graphics"] .blue-bg {
        background-color: #0033cc;
      }
    


      

      [data-composition-id="captions"] {
        width: 1080px;
        height: 1920px;
        display: flex;
