<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-02-typewriter-mechanical</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@500&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; }

    #scene-02-typewriter-mechanical {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 60%, #0e1419 0%, #050708 70%),
        linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
      font-family: "JetBrains Mono", "Menlo", monospace;
      color: #d4f1ff;
    }

    /* Scanline overlay — CRT/terminal vibe. Continuous-motion via animated background-position. */
    .scanlines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.0) 0px,
        rgba(255,255,255,0.0) 2px,
        rgba(255,255,255,0.025) 2px,
        rgba(255,255,255,0.025) 4px
      );
      pointer-events: none;
      mix-blend-mode: screen;
      will-change: transform;
    }

    /* Terminal window chrome */
    .terminal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1280px;
      border: 1px solid rgba(120, 180, 220, 0.18);
      border-radius: 12px;
      background: linear-gradient(180deg, #0c1115 0%, #06090c 100%);
      box-shadow:
        0 60px 120px -30px rgba(8, 88, 145, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(120, 180, 220, 0.12);
      background: rgba(15, 25, 35, 0.5);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28c941; }
    .terminal-title {
      flex: 1;
      text-align: center;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #5c6c7a;
      letter-spacing: 0.02em;
    }

    .terminal-body {
      padding: 56px 48px 64px;
      min-height: 360px;
      position: relative;
    }
    .prompt {
      font-size: 18px;
      color: #4a8db8;
      font-weight: 500;
      margin-bottom: 18px;
    }
    .typed {
      font-size: 64px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: #d4f1ff;
      display: inline;
      white-space: pre-wrap;
    }
    .typed .char {
      display: inline-block;
      white-space: pre;
      opacity: 0;          /* lock initial state for snapshot determinism */
      will-change: opacity, transform;
    }
    /* Cursor */
    .cursor {
      display: inline-block;
      width: 22px;
      height: 64px;
      vertical-align: text-bottom;
      background: #4ade80;
      margin-left: 4px;
      transform: translateY(8px);
      box-shadow: 0 0 24px rgba(74, 222, 128, 0.6);
    }

    /* Glow under cursor — adds depth */
    .cursor-glow {
      position: absolute;
      width: 80px;
      height: 80px;
      pointer-events: none;
      background: radial-gradient(circle, rgba(74, 222, 128, 0.18) 0%, transparent 60%);
      filter: blur(4px);
      opacity: 0;
    }

    .label {
      position: absolute;
      left: 48px;
      bottom: 48px;
      font-size: 16px;
      color: #5c6c7a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      font-family: "Inter", sans-serif;
      z-index: 10;
    }
    .label .accent { color: #d4f1ff; font-weight: 600; }
  </style>
</head>
<body>

  <div id="scene-02-typewriter-mechanical"
       data-composition-id="scene-02-typewriter-mechanical"
       data-start="0"
       data-duration="6"
       data-width="1920"
       data-height="1080"
       style="width:1920px; height:1080px;">

    <div class="scanlines"></div>

    <div class="terminal" id="terminal">
      <div class="terminal-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">~/projects/launch ── zsh</span>
      </div>
      <div class="terminal-body">
        <div class="prompt">$ echo</div>
        <div class="typed" id="typed-row">
          <span id="typed-phrase-1"></span><span class="cursor" id="cursor"></span>
        </div>
        <div class="cursor-glow" id="cursor-glow"></div>
      </div>
    </div>

    <div class="label">
      Scene 02 · <span class="accent">Typewriter</span> · stepped per-character — terminal/editorial
    </div>
  </div>

  <script>
    (function () {
      var BEAT = 6;
      window.__timelines = window.__timelines || {};

      // Two phrases — first typed in, exits, second typed in.
      // Phrase 2 is kept short to avoid wrapping inside the terminal body.
      var phrases = ["Precision in motion.", "Pause. Continue."];

      function splitInto(host, text) {
        var spans = [];
        var frag = document.createDocumentFragment();
        Array.from(text).forEach(function (ch) {
          var span = document.createElement("span");
          span.className = "char";
          span.textContent = ch === " " ? " " : ch;
          frag.appendChild(span);
          spans.push(span);
        });
        host.replaceChildren(frag);
        return spans;
      }

      // Pre-build phrase 1's characters. Phrase 2 builds at the swap point —
      // but we need it DOM-resident at t=0 for the snapshot tool to find chars.
      // Solution: build both into different host spans, hide phrase 2 via opacity:0
      // on the entire wrapper. At swap, hide phrase 1 wrapper, show phrase 2.
      var typedRow = document.getElementById("typed-row");
      var p1Host = document.getElementById("typed-phrase-1");
      var p1Chars = splitInto(p1Host, phrases[0]);

      // Add phrase 2 host after p1 in the same row but as a separate wrapper.
      var p2Host = document.createElement("span");
      p2Host.id = "typed-phrase-2";
      p2Host.style.display = "none"; // hidden until swap
      typedRow.insertBefore(p2Host, document.getElementById("cursor"));
      var p2Chars = splitInto(p2Host, phrases[1]);

      // Cursor position is between phrase wrappers and the end of the row.
      var cursor = document.getElementById("cursor");

      var tl = gsap.timeline({ paused: true });

      // === Continuous motion through entire beat: scanlines drift down (CRT scroll).
      tl.fromTo(".scanlines",
        { y: 0 },
        { y: 8, duration: 0.6, ease: "none", repeat: 9, yoyo: true },
        0);

      // === Cursor breathing (steady blink) for all 6 seconds.
      tl.fromTo(cursor,
        { opacity: 1 },
        { opacity: 0.15, duration: 0.5, repeat: 11, yoyo: true, ease: "steps(1)" },
        0);

      // === Cursor glow follows cursor position — we approximate via fixed positions.
      // Glow starts hidden, pulses on while typing happens.
      tl.fromTo("#cursor-glow",
        { opacity: 0, x: 96, y: 96 },
        { opacity: 1, duration: 0.4, ease: "expo.out" },
        0.25);

      // === t=0.3s: phrase 1 types character-by-character.
      // Spec: scaled_duration 173ms, scaled_stagger 33ms, ease steps(1,end).
      // GSAP steps(1) = instant per-char appearance with stagger between.
      tl.to(p1Chars, {
        opacity: 1,
        duration: 0.173,
        stagger: 0.033,
        ease: "steps(1)",
      }, 0.30);

      // Pre-typed phrase 1 ends at 0.3 + 0.173 + (19 * 0.033) = ~1.10s

      // === Continuous motion 1.1s-2.5s: cursor glow ambient pulse during hold.
      tl.to("#cursor-glow", {
        opacity: 0.5,
        scale: 1.3,
        duration: 0.7,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
        transformOrigin: "50% 50%",
      }, 1.20);

      // === t=2.5s: phrase 1 exits with subtle upward drift + opacity fade.
      // Spec exit: scaled_duration 187ms, stagger 7ms, exit easing curve.
      tl.to(p1Chars, {
        opacity: 0,
        y: -4,
        duration: 0.187,
        stagger: 0.007,
        ease: "power3.in",
      }, 2.50);

      // === t=2.9s: swap visibility — phrase 1 hidden, phrase 2 shown.
      tl.set("#typed-phrase-1", { display: "none" }, 2.90);
      tl.set("#typed-phrase-2", { display: "inline" }, 2.90);

      // === t=3.1s: phrase 2 types in.
      tl.to(p2Chars, {
        opacity: 1,
        duration: 0.173,
        stagger: 0.033,
        ease: "steps(1)",
      }, 3.10);

      // Phrase 2 has 22 chars including punctuation. Stagger ends ~3.85s.

      // === Continuous motion 4.0s-6.0s: terminal subtle drift (camera move).
      tl.to("#terminal", {
        y: -8,
        duration: 2.0,
        ease: "sine.inOut",
      }, 4.00);

      // === t=4.0s: cursor pulses brighter for emphasis on the final hold.
      tl.to("#cursor-glow", {
        opacity: 0.7,
        scale: 1.5,
        duration: 1.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
        transformOrigin: "50% 50%",
      }, 4.00);

      window.__timelines["scene-02-typewriter-mechanical"] = tl;
    })();
  </script>
</body>
</html>
